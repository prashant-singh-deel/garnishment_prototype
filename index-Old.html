<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Assignment Directives — Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F4F3EF;
  --surface: #FAFAF8;
  --white: #FFFFFF;
  --border: #E2E1DB;
  --border-strong: #C8C7C0;
  --text-primary: #141412;
  --text-secondary: #6B6A63;
  --text-muted: #9B9A93;
  --deel-green: #00C97C;
  --deel-green-dark: #00A366;
  --deel-green-light: #E6FBF3;
  --blue: #2D6BE4;
  --blue-light: #EBF0FC;
  --amber: #D97706;
  --amber-light: #FEF3C7;
  --red: #DC2626;
  --red-light: #FEE2E2;
  --purple: #7C3AED;
  --purple-light: #EDE9FE;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.06);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── SHELL ── */
.shell { display: flex; height: 100vh; overflow: hidden; }

/* ── LEFT SIDEBAR ── */
.sidebar {
  width: 260px; flex-shrink: 0;
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.logo-mark {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--text-primary);
  display: flex; align-items: center; justify-content: center;
}
.logo-mark span { color: white; font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; }
.logo-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
.logo-badge { font-size: 10px; font-weight: 600; background: var(--deel-green-light); color: var(--deel-green-dark); padding: 2px 7px; border-radius: 20px; margin-left: 4px; }

.perspective-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px; }
.perspective-tabs { display: flex; flex-direction: column; gap: 3px; }
.ptab {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.15s;
  font-size: 13px; font-weight: 500; color: var(--text-secondary);
  border: none; background: none; text-align: left; width: 100%;
}
.ptab:hover { background: var(--bg); color: var(--text-primary); }
.ptab.active { background: var(--text-primary); color: white; }
.ptab .pdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ptab-client .pdot { background: var(--blue); }
.ptab-ic .pdot { background: var(--deel-green); }
.ptab-ops .pdot { background: var(--purple); }
.ptab.active .pdot { background: white; opacity: 0.7; }

.sidebar-steps { padding: 16px 20px; flex: 1; }
.steps-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; }
.step-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 7px 8px; border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.15s;
  margin-bottom: 2px; position: relative;
}
.step-item:hover { background: var(--bg); }
.step-item.active { background: var(--blue-light); }
.step-item.done .step-dot { background: var(--deel-green); border-color: var(--deel-green); }
.step-item.done .step-dot::after { content: '✓'; color: white; font-size: 9px; font-weight: 700; }
.step-line-wrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; padding-top: 2px; }
.step-dot {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--border-strong);
  background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: var(--text-muted);
  flex-shrink: 0; transition: all 0.2s;
}
.step-item.active .step-dot { border-color: var(--blue); background: var(--blue); color: white; }
.step-connector-v { width: 1.5px; height: 14px; background: var(--border); margin: 2px 0; }
.step-info { flex: 1; padding-top: 1px; }
.step-name { font-size: 12px; font-weight: 500; color: var(--text-primary); line-height: 1.4; }
.step-item.active .step-name { color: var(--blue); }
.step-party { font-size: 11px; color: var(--text-muted); }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  height: 56px; flex-shrink: 0;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-breadcrumb { font-size: 13px; color: var(--text-muted); }
.topbar-breadcrumb span { color: var(--text-primary); font-weight: 500; }
.step-counter { font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text-muted); background: var(--bg); padding: 3px 10px; border-radius: 20px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }

.nav-btn {
  padding: 7px 16px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  border: 1px solid var(--border);
  background: white; color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
}
.nav-btn:hover { background: var(--bg); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.nav-btn.primary { background: var(--text-primary); color: white; border-color: var(--text-primary); }
.nav-btn.primary:hover { background: #2a2a28; }

.content { flex: 1; overflow-y: auto; padding: 32px 40px; }

/* ── SCREEN COMPONENTS ── */
.screen { display: none; animation: fadeIn 0.2s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.screen-title { font-size: 22px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.screen-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }

.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.card-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }

.alert { padding: 12px 16px; border-radius: var(--radius-md); margin-bottom: 16px; font-size: 13px; display: flex; gap: 10px; align-items: flex-start; }
.alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.alert-info { background: var(--blue-light); border: 1px solid #B8D0F7; color: #1a3a6b; }
.alert-warning { background: var(--amber-light); border: 1px solid #FCD34D; color: #78350f; }
.alert-success { background: var(--deel-green-light); border: 1px solid #A7F3D0; color: #065F46; }
.alert-danger { background: var(--red-light); border: 1px solid #FCA5A5; color: #7f1d1d; }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
.field-value { font-size: 14px; color: var(--text-primary); font-weight: 500; }
.field-value.mono { font-family: 'DM Mono', monospace; font-size: 13px; }

.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
.badge-pending { background: var(--amber-light); color: var(--amber); }
.badge-review { background: var(--blue-light); color: var(--blue); }
.badge-active { background: var(--deel-green-light); color: var(--deel-green-dark); }
.badge-disputed { background: var(--red-light); color: var(--red); }
.badge-complete { background: #F0FDF4; color: #166534; }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.upload-zone {
  border: 2px dashed var(--border-strong);
  border-radius: var(--radius-md);
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg);
  margin-bottom: 16px;
}
.upload-zone:hover { border-color: var(--blue); background: var(--blue-light); }
.upload-icon { font-size: 28px; margin-bottom: 8px; }
.upload-text { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.upload-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.uploaded-file {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  background: var(--deel-green-light);
  border: 1px solid #A7F3D0;
  border-radius: var(--radius-md);
  margin-bottom: 16px;
}
.file-icon { font-size: 20px; }
.file-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.file-size { font-size: 11px; color: var(--text-muted); }
.file-check { margin-left: auto; color: var(--deel-green-dark); font-size: 16px; font-weight: 700; }

.contractor-select {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  background: var(--white);
  border: 1.5px solid var(--blue);
  border-radius: var(--radius-md);
  margin-bottom: 16px;
}
.avatar { width: 36px; height: 36px; border-radius: 50%; background: #E0E7FF; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; color: var(--blue); flex-shrink: 0; }
.contractor-name { font-size: 14px; font-weight: 600; }
.contractor-meta { font-size: 12px; color: var(--text-muted); }
.check-mark { margin-left: auto; width: 22px; height: 22px; border-radius: 50%; background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }

.input-field {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  color: var(--text-primary);
  background: white;
  outline: none; transition: border-color 0.15s;
}
.input-field:focus { border-color: var(--blue); }
.input-group { margin-bottom: 14px; }
.input-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; display: block; }

.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* Wallet display */
.wallet-card {
  background: linear-gradient(135deg, #141412 0%, #2a2a26 100%);
  border-radius: var(--radius-xl);
  padding: 28px;
  color: white;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.wallet-card::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: rgba(255,255,255,0.04);
  border-radius: 50%;
}
.wallet-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.5; margin-bottom: 8px; }
.wallet-total { font-size: 32px; font-weight: 300; font-family: 'DM Mono', monospace; letter-spacing: -1px; margin-bottom: 20px; }
.wallet-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.wallet-item { }
.wallet-item-label { font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.wallet-item-value { font-size: 16px; font-weight: 500; font-family: 'DM Mono', monospace; }
.wallet-item-value.reserved { color: #FCD34D; }
.wallet-item-value.available { color: var(--deel-green); }
.wallet-progress { margin-top: 20px; }
.progress-bar-bg { height: 6px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--deel-green); border-radius: 3px; transition: width 0.5s ease; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.5; margin-top: 6px; }

/* Verification checklist */
.check-list { display: flex; flex-direction: column; gap: 10px; }
.check-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg); border-radius: var(--radius-md); }
.check-item.pass { background: var(--deel-green-light); }
.check-item.fail { background: var(--red-light); }
.check-item.pending { background: var(--amber-light); }
.check-status { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.check-item.pass .check-status { background: var(--deel-green-dark); color: white; }
.check-item.fail .check-status { background: var(--red); color: white; }
.check-item.pending .check-status { background: var(--amber); color: white; }
.check-item-text { font-size: 13px; font-weight: 500; flex: 1; }
.check-item-sub { font-size: 11px; color: var(--text-muted); }

/* Notification card */
.notif-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 16px;
}
.notif-header {
  padding: 16px 20px;
  background: var(--amber-light);
  border-bottom: 1px solid #FCD34D;
  display: flex; align-items: center; gap: 10px;
}
.notif-icon { font-size: 20px; }
.notif-title { font-size: 14px; font-weight: 600; color: #78350f; }
.notif-body { padding: 20px; }
.notif-detail-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.notif-detail-row:last-child { border-bottom: none; }
.notif-key { color: var(--text-muted); }
.notif-val { font-weight: 600; color: var(--text-primary); }
.notif-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn { padding: 10px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.btn-accept { background: var(--deel-green); color: white; }
.btn-accept:hover { background: var(--deel-green-dark); }
.btn-dispute { background: white; border: 1.5px solid var(--border-strong); color: var(--text-primary); }
.btn-dispute:hover { background: var(--bg); }

/* Disbursement advice */
.advice-header {
  background: var(--text-primary);
  color: white;
  padding: 20px 24px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  display: flex; justify-content: space-between; align-items: flex-start;
}
.advice-body { background: white; border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius-lg) var(--radius-lg); padding: 24px; }
.advice-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.advice-row:last-child { border-bottom: none; }
.advice-row.total { font-weight: 700; font-size: 14px; }
.advice-row.redirected { color: var(--amber); }
.advice-row.received { color: var(--deel-green-dark); }

/* Balance tracker */
.balance-tracker {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin-bottom: 16px;
}
.tracker-bar-wrap { margin: 16px 0 8px; }
.tracker-bar-bg { height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; }
.tracker-bar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, var(--deel-green), #00E090); transition: width 0.6s ease; }
.tracker-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

/* Two column layout */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

.stat-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px 20px; }
.stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
.stat-value { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text-primary); }
.stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

/* Table */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); border-bottom: 1.5px solid var(--border); }
.data-table td { padding: 12px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg); }

/* Timeline */
.timeline { display: flex; flex-direction: column; gap: 0; }
.tl-item { display: flex; gap: 14px; }
.tl-left { display: flex; flex-direction: column; align-items: center; width: 30px; flex-shrink: 0; }
.tl-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--deel-green); margin-top: 5px; flex-shrink: 0; }
.tl-dot.pending { background: var(--border-strong); }
.tl-line { width: 2px; flex: 1; background: var(--border); min-height: 20px; margin: 3px 0; }
.tl-content { padding: 0 0 20px; flex: 1; }
.tl-time { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-bottom: 3px; }
.tl-event { font-size: 13px; font-weight: 500; }
.tl-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* Perspective strip */
.pov-strip {
  display: flex; gap: 0;
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  margin-bottom: 24px;
}
.pov-item { flex: 1; padding: 10px 16px; font-size: 12px; font-weight: 500; color: var(--text-muted); border-right: 1px solid var(--border); text-align: center; }
.pov-item:last-child { border-right: none; }
.pov-item.active { background: var(--text-primary); color: white; }
.pov-item .pov-role { font-size: 10px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }

</style>
</head>
<body>

<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-mark"><span>D</span></div>
        <span class="logo-name">Deel</span>
        <span class="logo-badge">Prototype</span>
      </div>
      <div class="perspective-label">View as</div>
      <div class="perspective-tabs">
        <button class="ptab ptab-client active" onclick="setPerspective('client')">
          <span class="pdot"></span> Client (OnTrac)
        </button>
        <button class="ptab ptab-ic" onclick="setPerspective('ic')">
          <span class="pdot"></span> Contractor (Jenniffer)
        </button>
        <button class="ptab ptab-ops" onclick="setPerspective('ops')">
          <span class="pdot"></span> Deel Ops
        </button>
      </div>
    </div>

    <div class="sidebar-steps">
      <div class="steps-label">Flow steps</div>
      <div class="timeline-steps" id="stepList"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-breadcrumb">Contractors / <span id="topbarContext">Payment Directives</span></span>
        <span class="step-counter" id="stepCounter">Step 1 of 10</span>
      </div>
      <div class="topbar-right">
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
        <button class="nav-btn primary" id="nextBtn" onclick="navigate(1)">Next →</button>
      </div>
    </div>

    <div class="content" id="mainContent"></div>
  </div>
</div>

<script>
const STEPS = [
  { id: 1, name: "IC raises invoice",         party: "Contractor",  perspective: "ic"     },
  { id: 2, name: "Client approves invoice",   party: "Client",      perspective: "client" },
  { id: 3, name: "Client pays Deel",          party: "Client",      perspective: "client" },
  { id: 4, name: "Client submits directive",  party: "Client",      perspective: "client" },
  { id: 5, name: "Deel verifies directive",   party: "Deel Ops",    perspective: "ops"    },
  { id: 6, name: "IC acknowledges",           party: "Contractor",  perspective: "ic"     },
  { id: 7, name: "Deel credits IC account",   party: "Deel / IC",   perspective: "ic"     },
  { id: 8, name: "Ring-fence activates",      party: "System",      perspective: "ic"     },
  { id: 9, name: "Auto payment fires",        party: "System",      perspective: "ops"    },
  { id: 10, name: "Directive terminates",     party: "System",      perspective: "client" },
];

const SCREENS = {
  client: {
    1: () => screenClientStep1(),
    2: () => screenClientStep2(),
    3: () => screenClientStep3(),
    4: () => screenClientStep4(),
    5: () => screenClientStep5(),
    6: () => screenClientStep6(),
    7: () => screenClientStep7(),

    9: () => screenClientStep9(),

let currentStep = 1;
let currentPerspective = 'client';

function setPerspective(p) {
  currentPerspective = p;
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  document.querySelector('.ptab-' + p).classList.add('active');
  render();
}

function navigate(dir) {
  const next = currentStep + dir;
  if (next < 1 || next > 10) return;
  currentStep = next;
  render();
}

function gotoStep(s) {
  currentStep = s;
  render();
}

function render() {
  // Update step counter
  document.getElementById('stepCounter').textContent = `Step ${currentStep} of 10`;

  // Update nav buttons
  document.getElementById('prevBtn').disabled = currentStep === 1;
  document.getElementById('nextBtn').disabled = currentStep === 10;
  document.getElementById('nextBtn').textContent = currentStep === 10 ? 'Done ✓' : 'Next →';

  // Update topbar context
  document.getElementById('topbarContext').textContent = STEPS[currentStep - 1].name;

  // Render sidebar steps
  const list = document.getElementById('stepList');
  list.innerHTML = '';
  STEPS.forEach((s, i) => {
    const done = i + 1 < currentStep;
    const active = i + 1 === currentStep;
    const isLast = i === STEPS.length - 1;

    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;';

    const item = document.createElement('div');
    item.className = 'step-item' + (active ? ' active' : '') + (done ? ' done' : '');
    item.onclick = () => gotoStep(i + 1);
    item.innerHTML = `
      <div class="step-line-wrap">
        <div class="step-dot">${done ? '✓' : s.id}</div>
        ${!isLast ? '<div class="step-connector-v"></div>' : ''}
      </div>
      <div class="step-info">
        <div class="step-name">${s.name}</div>
        <div class="step-party">${s.party}</div>
      </div>`;

    wrap.appendChild(item);
    list.appendChild(wrap);
  });

  // Render main screen
  const fn = SCREENS[currentPerspective][currentStep];
  document.getElementById('mainContent').innerHTML = fn ? fn() : notApplicable();
}

function notApplicable() {
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;">
    <div style="font-size:36px;">—</div>
    <div style="font-size:16px;font-weight:600;color:var(--text-primary);">No action in this step</div>
    <div style="font-size:13px;color:var(--text-muted);">This step is handled by another party.</div>
  </div>`;
}

function povStrip(active) {
  const parties = [{key:'client',label:'Client (OnTrac)'},{key:'ic',label:'Contractor (Jenniffer)'},{key:'ops',label:'Deel Ops'}];
  return `<div class="pov-strip">${parties.map(p=>`<div class="pov-item ${active===p.key?'active':''}" onclick="setPerspective('${p.key}')" style="cursor:pointer;"><div class="pov-role">${active===p.key?'You are':'Switch to'}</div>${p.label}</div>`).join('')}</div>`;
}
